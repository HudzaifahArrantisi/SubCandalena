<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubCandalena Dashboard</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <main class="page">
        <header class="topbar">
            <div>
                <p class="eyebrow">SubCandalena</p>
                <h1>Scan Dashboard</h1>
            </div>
            <form id="scanForm" class="scan-form">
                <input id="domainInput" name="domain" type="text" placeholder="example.com" required>
                <button type="submit">Start Scan</button>
            </form>
        </header>

        <section class="status-line" id="jobStatus">Ready.</section>

        <section class="stats" id="statsCards"></section>

        <section class="panel">
            <div class="panel-header">
                <h2>Results</h2>
                <input id="tableFilter" type="search" placeholder="Filter results">
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Subdomain</th>
                            <th>IP</th>
                            <th>Status</th>
                            <th>Title</th>
                            <th>Tech</th>
                            <th>Risk</th>
                            <th>Source</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="static/script.js"></script>
</body>
</html>
